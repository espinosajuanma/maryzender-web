{{ define "main" }}
    <h1 class="tag bg-moss typewriting title2 fit">
        Blog Posts
    </h1>

    <div class="paper bg-white">
        {{ .Content }}
    </div>

    <div id="post-list" class="my-4">
        {{- range .Pages -}}
            <article class="paper bg-white mb-4 p-4">
                <div class="tag bg-moss typewriting fit">
                    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
                </div>
                <div class="paper bg-mustard typewriting">
                    <a href="{{ .Permalink }}">{{ .Title }}</a>
                </div>
                {{ if .Summary }}
                    <p>{{ .Summary }}</p>
                {{ end }}
                <a href="{{ .Permalink }}" class="tag bg-soil fit typewriting mt-2">Read More</a>
            </article>
        {{- end }}
    </div>
{{ end }}
