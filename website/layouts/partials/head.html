<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- DYNAMIC TITLE -->
    <title>
        {{- if .IsHome -}}
            {{ .Site.Title }} | Evolutionary Biologist
        {{- else -}}
            {{ .Title }} | {{ .Site.Title }}
        {{- end -}}
    </title>

    <!-- DYNAMIC META DESCRIPTION -->
    {{- $description := "" -}}
    {{- if .IsHome -}}
        {{ $description = .Site.Params.description }}
    {{- else if .Params.description -}}
        {{ $description = .Params.description }}
    {{- else -}}
        {{ $description = .Summary | plainify | truncate 160 }}
    {{- end -}}
    <meta name="description" content="{{ $description }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="shortcut icon" href="/assets/m-favicon.png" type="image/x-icon">

    <!-- CSS & JS -->
    <link rel="preload" href="/fonts/lora-v37-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/special-elite-v20-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/homemade-apple-v24-latin-regular.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
