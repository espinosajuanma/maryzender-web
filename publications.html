<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryzender Rodríguez-Melgarejo | Evolutionary Biologist</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <nav class="mb-3">
            <div id="logo">
                <a href="/" class="tag bg-terracotta typewriting inner-border fit">Maryzender</a>
            </div>
            <div id="menu">
                <a class="tag bg-white typewriting fit" href="/">Home</a>
                <a class="tag bg-terracotta typewriting fit" href="/publications.html">Publications</a>
                <a class="tag bg-white typewriting fit" href="/contact.html">Contact</a>
            </div>
        </nav>
        <main>
            <div class="tag bg-moss typewriting title2 fit">
                Publications
            </div>
            <div id="publications-list" class="my-4">
                <!-- Publications will be loaded here by script -->
            </div>

            <div class="text-sm d-flex align-items-center justify-content-center flex-wrap my-4">
                <a href="https://scholar.google.com/citations?user=MTrNyqAAAAAJ&hl=es" target="_blank" class="tag inner-border bg-mustard fit typewriting">
                    Google Scholar
                </a>
                <a href="https://www.researchgate.net/profile/Maryzender-Rodriguez-Melgarejo" target="_blank" class="tag inner-border bg-mustard fit typewriting">
                    ResearchGate
                </a>
                <a href="https://orcid.org/0000-0002-3516-4270" target="_blank" class="tag inner-border bg-mustard fit typewriting">
                    ORCID
                </a>
                <a href="https://x.com/Maryzender_RM" target="_blank" class="tag inner-border bg-mustard fit typewriting">
                    X
                </a>
            </div>
       </main>

        <footer>
            <div class="paper bg-white">maryzender.com © 2025 by Maryzender Rodríguez Melgarejo is licensed under CC BY 4.0</div>
            <div class="d-flex justify-content-end">
                <p>Designed by <a class="bg-moss" href="https://linkedin.com/in/espinosajuanma" target="_blank">Juanma</a></p>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/data/publications.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    const container = document.getElementById('publications-list');
                    if (!container) return;

                    const totalPubs = data.length;
                    let pubCounter = totalPubs;
                    let currentYear = null;

                    data.forEach(pub => {
                        const year = new Date(pub.date).getFullYear();
                        if (year !== currentYear) {
                            currentYear = year;
                            const yearElement = document.createElement('div');
                            yearElement.className = 'tag bg-terracotta typewriting title2 fit my-4';
                            yearElement.textContent = year;
                            container.appendChild(yearElement);
                        }

                        const formattedAuthors = pub.authors.replace(/_([^_]+)_/g, '<span class="highlight-blue">$1</span>');

                        const pubElement = document.createElement('div');
                        pubElement.className = 'row align-items-center mb-5';
                        pubElement.innerHTML = `
                            <div class="col-md-3 text-center mb-3 mb-md-0">
                                <a href="${pub.doi}" target="_blank" style="box-shadow: none; position: relative; display: inline-block;">
                                    <!-- <div class="tag bg-moss fit typewriting" style="position: absolute; top: -15px; left: 0; margin: 0; z-index: 1;">${pubCounter.toString().padStart(2, '0')}</div> -->
                                    <img src="${pub.image}" class="img-fluid paper-shadow" style="max-height: 180px;" alt="Publication image for ${pub.title}">
                                </a>
                            </div>
                            <div class="col-md-9">
                                <div class="paper bg-white" style="padding: 1rem;">
                                    <h5 class="typewriting" style="font-size: 1.1rem;"><span>${pubCounter.toString().padStart(2, '0')}.</span> ${pub.title}</h5>
                                    <p class="mb-1"><strong>Authors:</strong> ${formattedAuthors}</p>
                                    <p class="mb-1"><strong>Journal:</strong> ${pub.journal}</p>
                                    <p class="mb-2"><strong>Date:</strong> ${pub.date}</p>
                                    <a href="${pub.doi}" target="_blank" class="tag bg-soil fit typewriting">Read Paper</a>
                                </div>
                            </div>
                        `;
                        container.appendChild(pubElement);
                        pubCounter--;
                    });
                })
                .catch(error => {
                    console.error('Error loading publications:', error);
                    const container = document.getElementById('publications-list');
                    if(container) container.innerHTML = '<p class="text-center">Could not load publications. Please try again later.</p>';
                });
        });
    </script>
</body>
</html>
